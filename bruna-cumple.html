<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🎂 ¡Feliz Cumple Bruna! 🎈</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    overflow: hidden;
    touch-action: manipulation;
    font-family: 'Segoe UI', Arial, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    height: 100vh; width: 100vw;
    -webkit-user-select: none; user-select: none;
  }
  canvas { display: block; }

  /* Intro Screen */
  #intro {
    position: fixed; inset: 0; z-index: 100;
    background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; color: #fff; padding: 20px;
    animation: fadeIn 0.5s;
  }
  #intro img {
    width: 140px; height: 140px; border-radius: 50%;
    object-fit: cover; border: 5px solid #fff;
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    margin-bottom: 20px;
    animation: bounceIn 1s;
  }
  #intro h1 { font-size: 2em; margin-bottom: 8px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
  #intro p { font-size: 1.1em; margin-bottom: 25px; opacity: 0.9; max-width: 320px; }
  #intro button {
    padding: 16px 40px; font-size: 1.3em; border: none; border-radius: 50px;
    background: #fff; color: #f5576c; font-weight: bold; cursor: pointer;
    box-shadow: 0 6px 20px rgba(0,0,0,0.2);
    transition: transform 0.2s;
  }
  #intro button:active { transform: scale(0.95); }

  /* HUD */
  #hud {
    position: fixed; top: 0; left: 0; right: 0; z-index: 10;
    padding: 10px 15px;
    background: rgba(0,0,0,0.3); backdrop-filter: blur(10px);
    display: none; align-items: center; justify-content: space-between;
  }
  #message-bar {
    display: flex; gap: 4px; flex-wrap: wrap; justify-content: center; flex: 1;
  }
  .letter-slot {
    width: 28px; height: 34px; border-radius: 6px;
    background: rgba(255,255,255,0.15); border: 2px solid rgba(255,255,255,0.3);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.2em; font-weight: bold; color: #fff;
    transition: all 0.3s;
  }
  .letter-slot.space { border: none; background: transparent; width: 16px; }
  .letter-slot.revealed {
    background: #ffd700; border-color: #ffd700; color: #333;
    animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    box-shadow: 0 0 12px rgba(255,215,0,0.6);
  }
  #score-display {
    color: #ffd700; font-weight: bold; font-size: 1.1em;
    min-width: 50px; text-align: right;
  }

  /* Celebration */
  #celebration {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.85); backdrop-filter: blur(8px);
    display: none; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; color: #fff; padding: 20px;
  }
  #celebration.show { display: flex; animation: fadeIn 0.5s; }
  #celebration img {
    width: 160px; height: 160px; border-radius: 50%;
    object-fit: cover; border: 5px solid #ffd700;
    box-shadow: 0 0 40px rgba(255,215,0,0.5);
    margin-bottom: 20px;
    animation: bounceIn 0.8s;
  }
  #celebration h1 {
    font-size: 2.2em; margin-bottom: 10px;
    background: linear-gradient(45deg, #ffd700, #ff6b6b, #ffd700);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    animation: glow 2s infinite;
  }
  #celebration p { font-size: 1.2em; opacity: 0.9; margin-bottom: 8px; }
  #celebration .stats { font-size: 0.95em; opacity: 0.7; margin-top: 15px; }
  #celebration button {
    margin-top: 20px; padding: 14px 36px; font-size: 1.1em;
    border: none; border-radius: 50px;
    background: linear-gradient(45deg, #ffd700, #ffaa00);
    color: #333; font-weight: bold; cursor: pointer;
    box-shadow: 0 4px 15px rgba(255,215,0,0.4);
  }

  /* Confetti canvas */
  #confetti-canvas {
    position: fixed; inset: 0; z-index: 199; pointer-events: none;
  }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes bounceIn {
    0% { transform: scale(0); } 50% { transform: scale(1.15); } 100% { transform: scale(1); }
  }
  @keyframes popIn {
    0% { transform: scale(0) rotate(-10deg); } 100% { transform: scale(1) rotate(0); }
  }
  @keyframes glow {
    0%,100% { filter: brightness(1); } 50% { filter: brightness(1.3); }
  }
</style>
</head>

// Audio context for pop sounds
let audioCtx;
function playPop() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.frequency.setValueAtTime(600 + Math.random() * 400, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.15);
  gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
  osc.start(); osc.stop(audioCtx.currentTime + 0.15);
}
function playReveal() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.type = 'triangle';
  osc.frequency.setValueAtTime(523, audioCtx.currentTime);
  osc.frequency.setValueAtTime(659, audioCtx.currentTime + 0.1);
  osc.frequency.setValueAtTime(784, audioCtx.currentTime + 0.2);
  gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.35);
  osc.start(); osc.stop(audioCtx.currentTime + 0.35);
}
function playCelebration() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const notes = [523, 587, 659, 698, 784, 880, 988, 1047];
  notes.forEach((freq, i) => {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.type = 'triangle';
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0.2, audioCtx.currentTime + i * 0.12);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + i * 0.12 + 0.3);
    osc.start(audioCtx.currentTime + i * 0.12);
    osc.stop(audioCtx.currentTime + i * 0.12 + 0.3);
  });
}

function initCanvas() {
  canvas = document.getElementById('game');
  ctx = canvas.getContext('2d');
  resize();
  window.addEventListener('resize', resize);
}

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}

function buildMessageBar() {
  const bar = document.getElementById('message-bar');
  bar.innerHTML = '';
  letterSlots = [];
  for (let i = 0; i < SECRET.length; i++) {
    const slot = document.createElement('div');
    slot.className = 'letter-slot' + (SECRET[i] === ' ' ? ' space' : '');
    bar.appendChild(slot);
    letterSlots.push(slot);
  }
  revealedLetters = new Array(SECRET.length).fill(false);
  nextLetterIdx = 0;
  while (nextLetterIdx < SECRET.length && SECRET[nextLetterIdx] === ' ') {
    revealedLetters[nextLetterIdx] = true;
    letterSlots[nextLetterIdx].classList.add('revealed');
    nextLetterIdx++;
  }
}

class Balloon {
  constructor(hasLetter) {
    this.r = 32 + Math.random() * 16;
    this.x = this.r + Math.random() * (W - this.r * 2);
    this.y = H + this.r + Math.random() * 100;
    this.speed = 1.2 + Math.random() * 1.5 + difficulty * 0.15;
    this.wobbleAmp = 15 + Math.random() * 25;
    this.wobbleSpeed = 0.5 + Math.random() * 1.5;
    this.wobbleOffset = Math.random() * Math.PI * 2;
    this.color = BALLOON_COLORS[Math.floor(Math.random() * BALLOON_COLORS.length)];
    this.hasLetter = hasLetter;
    this.letter = hasLetter ? SECRET[nextLetterIdx] : null;
    this.emoji = hasLetter ? null : EMOJI_DECOYS[Math.floor(Math.random() * EMOJI_DECOYS.length)];
    this.alive = true;
    this.opacity = 1;
    this.time = 0;
    this.hasFace = !hasLetter && Math.random() < 0.15;
  }

  update(dt) {
    this.time += dt;
    this.y -= this.speed * dt * 60;
    this.x += Math.sin(this.time * this.wobbleSpeed + this.wobbleOffset) * this.wobbleAmp * dt;
    if (this.y < -this.r * 2) this.alive = false;
  }

  draw(ctx) {
    const x = this.x, y = this.y, r = this.r;
    // String
    ctx.strokeStyle = 'rgba(255,255,255,0.4)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(x, y + r);
    ctx.quadraticCurveTo(x + 5, y + r + 20, x - 3, y + r + 40);
    ctx.stroke();

    // Balloon body
    ctx.save();
    ctx.beginPath();
    ctx.ellipse(x, y, r * 0.85, r, 0, 0, Math.PI * 2);
    const grad = ctx.createRadialGradient(x - r * 0.3, y - r * 0.3, r * 0.1, x, y, r);
    grad.addColorStop(0, '#fff');
    grad.addColorStop(0.3, this.color);
    grad.addColorStop(1, this.darken(this.color, 0.6));
    ctx.fillStyle = grad;
    ctx.globalAlpha = this.opacity;
    ctx.fill();

    // Shine
    ctx.beginPath();
    ctx.ellipse(x - r * 0.25, y - r * 0.35, r * 0.15, r * 0.25, -0.5, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.fill();

    // Knot
    ctx.beginPath();
    ctx.moveTo(x - 4, y + r);
    ctx.lineTo(x, y + r + 6);
    ctx.lineTo(x + 4, y + r);
    ctx.fillStyle = this.darken(this.color, 0.5);
    ctx.fill();

    // Content
    ctx.globalAlpha = this.opacity;
    if (this.hasFace && brunaPic.complete) {
      ctx.save();
      ctx.beginPath();
      ctx.arc(x, y, r * 0.5, 0, Math.PI * 2);
      ctx.clip();
      ctx.drawImage(brunaPic, x - r * 0.5, y - r * 0.5, r, r);
      ctx.restore();
    } else if (this.hasLetter) {
      ctx.fillStyle = '#fff';
      ctx.font = old px Arial;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.shadowColor = 'rgba(0,0,0,0.3)';
      ctx.shadowBlur = 4;
      ctx.fillText(this.letter, x, y);
      ctx.shadowBlur = 0;
      // Star indicator
      ctx.font = ${r * 0.4}px Arial;
      ctx.fillText('⭐', x, y - r * 0.6);
    } else {
      ctx.font = ${r * 0.7}px Arial;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(this.emoji, x, y);
    }
    ctx.restore();
  }

  darken(hex, factor) {
    const r = parseInt(hex.slice(1,3),16) * factor;
    const g = parseInt(hex.slice(3,5),16) * factor;
    const b = parseInt(hex.slice(5,7),16) * factor;
    return gb(,,);
  }

  hitTest(px, py) {
    const dx = px - this.x, dy = py - this.y;
    return dx * dx + dy * dy <= (this.r + 10) * (this.r + 10);
  }
}

class PopParticle {
  constructor(x, y, color) {
    this.x = x; this.y = y;
    this.vx = (Math.random() - 0.5) * 8;
    this.vy = (Math.random() - 0.5) * 8 - 2;
    this.r = 3 + Math.random() * 5;
    this.color = color;
    this.life = 1;
    this.decay = 0.02 + Math.random() * 0.02;
  }
  update() {
    this.x += this.vx; this.y += this.vy;
    this.vy += 0.15;
    this.life -= this.decay;
  }
  draw(ctx) {
    ctx.globalAlpha = this.life;
    ctx.fillStyle = this.color;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r * this.life, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

function spawnBalloon() {
  // Decide if this balloon carries a letter
  const lettersRemaining = nextLetterIdx < SECRET.length;
  const hasLetter = lettersRemaining && Math.random() < 0.35;
  balloons.push(new Balloon(hasLetter));
}

function handlePop(x, y) {
  if (!gameActive) return;
  for (let i = balloons.length - 1; i >= 0; i--) {
    const b = balloons[i];
    if (b.hitTest(x, y)) {
      // Create particles
      for (let j = 0; j < 12; j++) {
        popParticles.push(new PopParticle(b.x, b.y, b.color));
      }
      playPop();
      popped++;
      score += b.hasLetter ? 50 : 10;
      document.getElementById('score-display').textContent = '🎈 ' + score;

      if (b.hasLetter && nextLetterIdx < SECRET.length) {
        revealedLetters[nextLetterIdx] = true;
        letterSlots[nextLetterIdx].textContent = SECRET[nextLetterIdx];
        letterSlots[nextLetterIdx].classList.add('revealed');
        playReveal();
        nextLetterIdx++;
        // Skip spaces
        while (nextLetterIdx < SECRET.length && SECRET[nextLetterIdx] === ' ') {
          revealedLetters[nextLetterIdx] = true;
          letterSlots[nextLetterIdx].classList.add('revealed');
          nextLetterIdx++;
        }
        // Check win
        if (nextLetterIdx >= SECRET.length) {
          setTimeout(celebrate, 600);
        }
      }

      balloons.splice(i, 1);
      return;
    }
  }
}

let lastTime = 0;
function gameLoop(ts) {
  if (!gameActive) return;
  const dt = Math.min((ts - lastTime) / 1000, 0.05);
  lastTime = ts;

  // Difficulty ramp
  difficulty = 1 + (ts - startTime) / 30000;

  // Spawn
  spawnTimer -= dt;
  if (spawnTimer <= 0) {
    spawnBalloon();
    spawnTimer = Math.max(0.3, 1.2 - difficulty * 0.08) + Math.random() * 0.5;
  }

  // Update
  balloons.forEach(b => b.update(dt));
  balloons = balloons.filter(b => b.alive);
  popParticles.forEach(p => p.update());
  popParticles = popParticles.filter(p => p.life > 0);

  // Draw
  // Background gradient
  const bgGrad = ctx.createLinearGradient(0, 0, 0, H);
  bgGrad.addColorStop(0, '#1a1a2e');
  bgGrad.addColorStop(0.5, '#16213e');
  bgGrad.addColorStop(1, '#0f3460');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, W, H);

  // Stars
  for (let i = 0; i < 50; i++) {
    const sx = (i * 137.5 + ts * 0.002 * (i % 3 + 1)) % W;
    const sy = (i * 97.3) % (H * 0.6);
    const sr = 0.5 + (i % 3) * 0.5;
    ctx.fillStyle = gba(255,255,255,);
    ctx.beginPath();
    ctx.arc(sx, sy, sr, 0, Math.PI * 2);
    ctx.fill();
  }

  balloons.forEach(b => b.draw(ctx));
  popParticles.forEach(p => p.draw(ctx));

  requestAnimationFrame(gameLoop);
}

// Event handlers
function getEventPos(e) {
  if (e.touches) return { x: e.touches[0].clientX, y: e.touches[0].clientY };
  return { x: e.clientX, y: e.clientY };
}

function startGame() {
  document.getElementById('intro').style.display = 'none';
  document.getElementById('hud').style.display = 'flex';
  initCanvas();
  buildMessageBar();
  score = 0; popped = 0; balloons = []; popParticles = [];
  spawnTimer = 0; difficulty = 1;
  document.getElementById('score-display').textContent = '�� 0';
  gameActive = true;
  startTime = performance.now();
  lastTime = startTime;
  requestAnimationFrame(gameLoop);

  canvas.addEventListener('click', e => handlePop(e.clientX, e.clientY));
  canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    handlePop(e.touches[0].clientX, e.touches[0].clientY);
  }, { passive: false });
}

function celebrate() {
  gameActive = false;
  const elapsed = ((performance.now() - startTime) / 1000).toFixed(1);
  document.getElementById('stats').textContent =
    Globos explotados:  | Puntaje:  | Tiempo: s;
  document.getElementById('celebration').classList.add('show');
  playCelebration();
  startConfetti();
}

function resetGame() {
  document.getElementById('celebration').classList.remove('show');
  stopConfetti();
  buildMessageBar();
  score = 0; popped = 0; balloons = []; popParticles = [];
  spawnTimer = 0; difficulty = 1; nextLetterIdx = 0;
  // Re-skip initial spaces
  while (nextLetterIdx < SECRET.length && SECRET[nextLetterIdx] === ' ') {
    revealedLetters[nextLetterIdx] = true;
    letterSlots[nextLetterIdx].classList.add('revealed');
    nextLetterIdx++;
  }
  document.getElementById('score-display').textContent = '🎈 0';
  gameActive = true;
  startTime = performance.now();
  lastTime = startTime;
  requestAnimationFrame(gameLoop);
}

// Confetti
let confettiPieces = [], confettiAnim;
function startConfetti() {
  const cc = document.getElementById('confetti-canvas');
  cc.width = window.innerWidth; cc.height = window.innerHeight;
  const cctx = cc.getContext('2d');
  confettiPieces = [];
  for (let i = 0; i < 200; i++) {
    confettiPieces.push({
      x: Math.random() * cc.width,
      y: Math.random() * cc.height - cc.height,
      r: 4 + Math.random() * 6,
      color: BALLOON_COLORS[Math.floor(Math.random() * BALLOON_COLORS.length)],
      vy: 2 + Math.random() * 4,
      vx: (Math.random() - 0.5) * 3,
      rot: Math.random() * 360,
      rotSpeed: (Math.random() - 0.5) * 10
    });
  }
  function animConfetti() {
    cctx.clearRect(0, 0, cc.width, cc.height);
    confettiPieces.forEach(p => {
      p.y += p.vy; p.x += p.vx; p.rot += p.rotSpeed;
      if (p.y > cc.height + 20) { p.y = -20; p.x = Math.random() * cc.width; }
      cctx.save();
      cctx.translate(p.x, p.y);
      cctx.rotate(p.rot * Math.PI / 180);
      cctx.fillStyle = p.color;
      cctx.fillRect(-p.r / 2, -p.r / 4, p.r, p.r / 2);
      cctx.restore();
    });
    confettiAnim = requestAnimationFrame(animConfetti);
  }
  animConfetti();
}
function stopConfetti() {
  cancelAnimationFrame(confettiAnim);
  const cc = document.getElementById('confetti-canvas');
  cc.getContext('2d').clearRect(0, 0, cc.width, cc.height);
}
