<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐍 Snake — Nokia Style</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a2e;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; font-family: 'Courier New', monospace;
            flex-direction: column; gap: 1rem; padding: 1rem;
            user-select: none; -webkit-user-select: none;
        }

        .nokia-frame {
            background: #2d2d5e;
            border-radius: 24px;
            padding: 20px;
            border: 3px solid #3d3d7e;
            box-shadow: 0 0 40px rgba(100, 100, 255, 0.15), inset 0 2px 4px rgba(255,255,255,0.05);
        }

        .screen-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 8px; padding: 0 4px;
        }

        .score-display {
            color: #7fff7f; font-size: 14px; font-weight: bold;
            text-shadow: 0 0 8px rgba(127,255,127,0.5);
        }

        .high-score { color: #ffcc00; font-size: 12px; }

        canvas {
            display: block;
            background: #0f0f23;
            border: 2px solid #3d3d7e;
            border-radius: 4px;
            image-rendering: pixelated;
        }

        .controls {
            display: flex; flex-direction: column; align-items: center;
            gap: 4px; margin-top: 12px;
        }

        .controls-row { display: flex; gap: 4px; }

        .ctrl-btn {
            width: 52px; height: 52px;
            background: linear-gradient(145deg, #3a3a6e, #25254a);
            border: 2px solid #4a4a8e;
            border-radius: 12px; color: #9999ff;
            font-size: 20px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.1s;
            -webkit-tap-highlight-color: transparent;
        }

        .ctrl-btn:active {
            background: linear-gradient(145deg, #4a4a8e, #35356a);
            transform: scale(0.95);
            color: #ccccff;
        }

        .start-btn {
            margin-top: 8px;
            padding: 8px 32px;
            background: linear-gradient(145deg, #2e7d32, #1b5e20);
            border: 2px solid #4caf50;
            border-radius: 20px;
            color: #a5d6a7;
            font-family: 'Courier New', monospace;
            font-size: 13px; font-weight: bold;
            cursor: pointer; text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.15s;
        }

        .start-btn:active {
            transform: scale(0.95);
            background: linear-gradient(145deg, #4caf50, #2e7d32);
        }

        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            background: rgba(15, 15, 35, 0.88);
            border-radius: 4px;
            z-index: 10;
        }

        .overlay-title {
            color: #7fff7f; font-size: 22px; font-weight: bold;
            text-shadow: 0 0 12px rgba(127, 255, 127, 0.6);
            margin-bottom: 6px;
        }

        .overlay-sub {
            color: #9999cc; font-size: 12px;
        }

        .overlay-score {
            color: #ffcc00; font-size: 16px; margin: 8px 0;
            text-shadow: 0 0 8px rgba(255, 204, 0, 0.5);
        }

        .game-area { position: relative; }

        .speed-indicator {
            color: #666699; font-size: 10px; text-align: center; margin-top: 6px;
        }

        @media (max-width: 500px) {
            .nokia-frame { padding: 14px; border-radius: 18px; }
            .ctrl-btn { width: 56px; height: 56px; font-size: 22px; }
        }
    </style>
</head>
<body>
    <div class="nokia-frame">
        <div class="screen-header">
            <span class="score-display">🍎 <span id="score">0</span></span>
            <span class="high-score">🏆 <span id="highScore">0</span></span>
        </div>
        <div class="game-area">
            <canvas id="game" width="320" height="320"></canvas>
            <div class="overlay" id="overlay">
                <div class="overlay-title">🐍 SNAKE</div>
                <div class="overlay-sub">Comé todas las manzanas</div>
                <div class="overlay-sub" style="margin-top: 12px; color: #7fff7f;">Presioná START o ESPACIO</div>
            </div>
        </div>
        <div class="speed-indicator" id="speedInfo">Velocidad: Normal</div>
        <div class="controls">
            <div class="controls-row">
                <div style="width:52px"></div>
                <button class="ctrl-btn" id="btnUp" ontouchstart="handleTouch('up',event)">▲</button>
                <div style="width:52px"></div>
            </div>
            <div class="controls-row">
                <button class="ctrl-btn" id="btnLeft" ontouchstart="handleTouch('left',event)">◀</button>
                <button class="ctrl-btn" id="btnDown" ontouchstart="handleTouch('down',event)">▼</button>
                <button class="ctrl-btn" id="btnRight" ontouchstart="handleTouch('right',event)">▶</button>
            </div>
            <button class="start-btn" id="startBtn" onclick="startGame()">START</button>
        </div>
    </div>

    <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const overlay = document.getElementById('overlay');
    const scoreEl = document.getElementById('score');
    const highScoreEl = document.getElementById('highScore');
    const speedInfo = document.getElementById('speedInfo');

    const GRID = 20;
    const COLS = canvas.width / GRID;
    const ROWS = canvas.height / GRID;

    let snake, dir, nextDir, apple, score, highScore, gameLoop, alive, started;

    highScore = parseInt(localStorage.getItem('snakeHigh') || '0');
    highScoreEl.textContent = highScore;

    function init() {
        const mid = Math.floor(COLS / 2);
        snake = [
            { x: mid, y: Math.floor(ROWS / 2) },
            { x: mid - 1, y: Math.floor(ROWS / 2) },
            { x: mid - 2, y: Math.floor(ROWS / 2) }
        ];
        dir = { x: 1, y: 0 };
        nextDir = { x: 1, y: 0 };
        score = 0;
        alive = true;
        started = true;
        scoreEl.textContent = '0';
        placeApple();
        overlay.style.display = 'none';
        updateSpeed();
    }

    function placeApple() {
        let pos;
        do {
            pos = { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) };
        } while (snake.some(s => s.x === pos.x && s.y === pos.y));
        apple = pos;
    }

    function getSpeed() {
        if (score < 5) return 140;
        if (score < 10) return 120;
        if (score < 20) return 100;
        if (score < 35) return 80;
        return 65;
    }

    function updateSpeed() {
        const s = getSpeed();
        const label = s >= 130 ? 'Normal' : s >= 110 ? 'Rápido' : s >= 90 ? 'Muy rápido' : s >= 75 ? '¡Turbo!' : '🔥 INSANO';
        speedInfo.textContent = `Velocidad: ${label}`;
    }

    function update() {
        if (!alive) return;

        dir = { ...nextDir };
        const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

        // Wall collision
        if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
            gameOver(); return;
        }

        // Self collision
        if (snake.some(s => s.x === head.x && s.y === head.y)) {
            gameOver(); return;
        }

        snake.unshift(head);

        // Eat apple
        if (head.x === apple.x && head.y === apple.y) {
            score++;
            scoreEl.textContent = score;
            placeApple();
            updateSpeed();
            // Restart loop with new speed
            clearInterval(gameLoop);
            gameLoop = setInterval(update, getSpeed());
        } else {
            snake.pop();
        }

        draw();
    }

    function draw() {
        // Background grid
        ctx.fillStyle = '#0f0f23';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Subtle grid lines
        ctx.strokeStyle = '#1a1a35';
        ctx.lineWidth = 0.5;
        for (let i = 0; i <= COLS; i++) {
            ctx.beginPath(); ctx.moveTo(i * GRID, 0); ctx.lineTo(i * GRID, canvas.height); ctx.stroke();
        }
        for (let i = 0; i <= ROWS; i++) {
            ctx.beginPath(); ctx.moveTo(0, i * GRID); ctx.lineTo(canvas.width, i * GRID); ctx.stroke();
        }

        // Apple
        const ax = apple.x * GRID + GRID / 2;
        const ay = apple.y * GRID + GRID / 2;
        // Apple glow
        ctx.shadowColor = '#ff4444';
        ctx.shadowBlur = 12;
        ctx.font = `${GRID - 2}px serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('🍎', ax, ay);
        ctx.shadowBlur = 0;

        // Snake body
        snake.forEach((seg, i) => {
            const x = seg.x * GRID;
            const y = seg.y * GRID;
            const pad = 1;

            if (i === 0) {
                // Head
                ctx.fillStyle = '#7fff7f';
                ctx.shadowColor = '#7fff7f';
                ctx.shadowBlur = 8;
                roundRect(ctx, x + pad, y + pad, GRID - pad * 2, GRID - pad * 2, 5);
                ctx.fill();
                ctx.shadowBlur = 0;

                // Eyes
                const eyeSize = 3;
                ctx.fillStyle = '#0f0f23';
                if (dir.x === 1) { // right
                    ctx.fillRect(x + 13, y + 5, eyeSize, eyeSize);
                    ctx.fillRect(x + 13, y + 12, eyeSize, eyeSize);
                } else if (dir.x === -1) { // left
                    ctx.fillRect(x + 4, y + 5, eyeSize, eyeSize);
                    ctx.fillRect(x + 4, y + 12, eyeSize, eyeSize);
                } else if (dir.y === -1) { // up
                    ctx.fillRect(x + 5, y + 4, eyeSize, eyeSize);
                    ctx.fillRect(x + 12, y + 4, eyeSize, eyeSize);
                } else { // down
                    ctx.fillRect(x + 5, y + 13, eyeSize, eyeSize);
                    ctx.fillRect(x + 12, y + 13, eyeSize, eyeSize);
                }
            } else {
                // Body gradient
                const alpha = 0.9 - (i / snake.length) * 0.5;
                const green = Math.floor(200 - (i / snake.length) * 80);
                ctx.fillStyle = `rgba(80, ${green}, 80, ${alpha})`;
                roundRect(ctx, x + pad, y + pad, GRID - pad * 2, GRID - pad * 2, 4);
                ctx.fill();
            }
        });
    }

    function roundRect(ctx, x, y, w, h, r) {
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.lineTo(x + w - r, y);
        ctx.quadraticCurveTo(x + w, y, x + w, y + r);
        ctx.lineTo(x + w, y + h - r);
        ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
        ctx.lineTo(x + r, y + h);
        ctx.quadraticCurveTo(x, y + h, x, y + h - r);
        ctx.lineTo(x, y + r);
        ctx.quadraticCurveTo(x, y, x + r, y);
        ctx.closePath();
    }

    function gameOver() {
        alive = false;
        clearInterval(gameLoop);

        if (score > highScore) {
            highScore = score;
            localStorage.setItem('snakeHigh', highScore);
            highScoreEl.textContent = highScore;
        }

        // Flash effect
        ctx.fillStyle = 'rgba(255, 50, 50, 0.3)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        setTimeout(() => {
            overlay.innerHTML = `
                <div class="overlay-title">💀 GAME OVER</div>
                <div class="overlay-score">Puntaje: ${score} 🍎</div>
                <div class="overlay-sub">${score > highScore - 1 && score > 0 ? '🏆 ¡Nuevo récord!' : `Récord: ${highScore}`}</div>
                <div class="overlay-sub" style="margin-top: 12px; color: #7fff7f;">START o ESPACIO para reintentar</div>
            `;
            overlay.style.display = 'flex';
        }, 400);
    }

    function startGame() {
        clearInterval(gameLoop);
        init();
        draw();
        gameLoop = setInterval(update, getSpeed());
    }

    function setDirection(newDir) {
        if (!alive || !started) return;
        // Prevent reverse
        if (newDir === 'up' && dir.y !== 1) nextDir = { x: 0, y: -1 };
        else if (newDir === 'down' && dir.y !== -1) nextDir = { x: 0, y: 1 };
        else if (newDir === 'left' && dir.x !== 1) nextDir = { x: -1, y: 0 };
        else if (newDir === 'right' && dir.x !== -1) nextDir = { x: 1, y: 0 };
    }

    function handleTouch(direction, e) {
        e.preventDefault();
        if (!started || !alive) { startGame(); return; }
        setDirection(direction);
    }

    // Keyboard
    document.addEventListener('keydown', e => {
        if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space',' ','w','a','s','d'].includes(e.key)) {
            e.preventDefault();
        }

        if (e.key === ' ' || e.key === 'Space') {
            if (!started || !alive) startGame();
            return;
        }

        switch (e.key) {
            case 'ArrowUp': case 'w': case 'W': setDirection('up'); break;
            case 'ArrowDown': case 's': case 'S': setDirection('down'); break;
            case 'ArrowLeft': case 'a': case 'A': setDirection('left'); break;
            case 'ArrowRight': case 'd': case 'D': setDirection('right'); break;
        }
    });

    // Touch swipe support
    let touchStartX, touchStartY;
    canvas.addEventListener('touchstart', e => {
        e.preventDefault();
        touchStartX = e.touches[0].clientX;
        touchStartY = e.touches[0].clientY;
    }, { passive: false });

    canvas.addEventListener('touchend', e => {
        e.preventDefault();
        if (!touchStartX || !touchStartY) return;
        const dx = e.changedTouches[0].clientX - touchStartX;
        const dy = e.changedTouches[0].clientY - touchStartY;
        const absDx = Math.abs(dx), absDy = Math.abs(dy);

        if (Math.max(absDx, absDy) < 15) {
            if (!started || !alive) startGame();
            return;
        }

        if (absDx > absDy) {
            setDirection(dx > 0 ? 'right' : 'left');
        } else {
            setDirection(dy > 0 ? 'down' : 'up');
        }
        touchStartX = touchStartY = null;
    }, { passive: false });

    // Initial draw
    init();
    alive = false;
    started = false;
    draw();
    overlay.style.display = 'flex';
    </script>
</body>
</html>
